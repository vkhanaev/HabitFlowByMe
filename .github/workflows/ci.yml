name: HabitFlowByMe CI

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: test_db
      DATABASE_USER: test_user
      DATABASE_PASSWORD: test_password
      SECRET_KEY: test_secret_key_12345
      LOG_LEVEL: WARNING  # Отключаем спам логов в CI

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run Ruff (Lint)
        run: uv run ruff check .

      - name: Run Ruff (Format)
        run: uv run ruff format --check .

      - name: Run Mypy
        run: uv run mypy app/

      - name: Apply Database Migrations
        run: uv run alembic upgrade head

      - name: Check for missing migrations
        run: uv run alembic check

      - name: Run Tests & Generate HTML Report
        if: always()
        run: |
          uv run pytest \
            -v \
            --tb=short \
            --html=pytest-report.html \
           --self-contained-html

      - name: Upload Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_id }}
          path: pytest-report.html
          retention-days: 7 # Хранить отчет 7 дней, чтобы не забивать хранилище GitHub

  docker:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: habitflowbyme:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
