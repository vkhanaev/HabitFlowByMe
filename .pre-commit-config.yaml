repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        args:
          - --fix

      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.2.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.13.4
          - pydantic-settings
          - fastapi
          - sqlalchemy>=2.0.51
        args: [--ignore-missing-imports]
        exclude: ^(alembic/|tests/)
