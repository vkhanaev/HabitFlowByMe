services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-habitflowbyme}
      POSTGRES_USER: ${DATABASE_USER:-habitflowbyme}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-habitflowbyme} -d ${DATABASE_NAME:-habitflowbyme}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: