{% extends "base.html" %}
{% block title %}Регистрация - HabitFlow{% endblock %}

{% block content %}
<div class="card">
    <h2 style="text-align: center; margin-bottom: 1.5rem;">Создать аккаунт</h2>
    <form action="/register" method="post">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ email or '' }}" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="password_confirm">Подтвердите пароль</label>
            <input type="password" id="password_confirm" name="password_confirm" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn">Зарегистрироваться</button>
    </form>
    <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem;">
        Уже есть аккаунт? <a href="/login" style="color: var(--color-primary);">Войти</a>
    </p>
</div>
{% endblock %}
